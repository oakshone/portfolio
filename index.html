<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Navigation Example</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" media="screen" href="css/styles.min.css">

<!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;500&display=swap" rel="stylesheet">

</head>

<body>

<div id="navWrapper">
    <nav>
        <ul>
            <li class='active'><a href="#about"><img src="images/profile.svg"><span>About me</span></a></li>
            <li><a href="#education"><img src="images/education.svg"><span>Education</span></a></li>
            <li><a href="#career"><img src="images/goals.svg"><span>Career goals</span></a></li>
            <li><a href="#technology"><img src="images/computer.svg"><span>Technology Stack</span></a></li>
            <li><a href="#work"><img src="images/work.svg"><span>My Work</span></a></li>
            <li><a href="#contact"><img src="images/contact.svg"><span>Contact</span></a></li>
        </ul>
    </nav>
</div> <!-- end nav wrapper -->

<div id="mainWrapper">
    <main>
        <section id="about">
            <h1>Jackson Nieporte</h1>
            <p>Education and Career Portfolio</p>
        </section>

        <section id="education">
            <h1>Education</h1>
            <div class="row">
            <div class="column small-4 medium-4 large-2 round fill">
            <img src="images/education.jpg">
            </div>
            <p>hhhhhhhhhhhhhhhhhhhhhhh</p>
            
        </section>

        <section id="career">
            <h1>Career goals</h1>
            <div class="card">

        </section>


        <section id="technology">
            <h1>Technology Stack</h1>
            <div id="techCard">
                <h1>hello</h1>
                <p>sometimes I wish i wasnt so busy</p>
            </div>
        </section>
        <section id="work">
            <h1>My Work</h1>
        </section>

        <section id="contact">
            <h1>Contact</h1>
            <label>Name: <input type="text" name="name" autocomplete="given-name" required title="Name Here"></label>
            <label>Email: <input type="email" name="email" autocomplete="email" required title="Your Email Please"></label>
            <label>Message:<input type="text" name="message"></label>
            <button href="index.html">Send Message</button>

            <h1>Social</h1>
            <img src="images/spotify.svg" width="50" height="50">
            <img src="images/twitter.svg" width="50" height="50">
            <img src="images/instagram.svg" width="50" height="50">
            <img src="images/snapchat.svg" width="50" height="50">
        </section>

    </main>
</div><!-- end main wrapper -->
    
<div id="footerWrapper">
    <div id="footerWrapper">
        <footer>
            <p>&copy; <span id="year">x</span> &bull; Jackson Nieporte</p>
        </footer>
    </div>
</div> <!-- end footer wrapper -->
<script src="js/scripts.js"></script>
</body>
</html>
